name: checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint + format check — fast, cheap. Runs first so we fail loud on
  # style/import/etc. issues before spending time on the test matrix.
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: ruff check
        run: ruff check src/ tests/ tools/
      - name: ruff format check
        run: ruff format --check src/ tests/ tools/

  # Unit tests — runs across the OSes and Python versions we support.
  unit-tests:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: lint   # Don't burn the matrix if lint is broken.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
